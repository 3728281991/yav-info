<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ЯВЬ Мониторинг</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8faf7;
            color: #0b1a0f;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 18px 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-inner img {
            height: 48px;
            width: auto;
        }
        .header-back {
            text-decoration: none;
            color: #4a5a4e;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .header-back:hover {
            color: #236010;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 60px;
        }

        .login-card {
            background: #fff;
            border-radius: 28px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12);
            border: 1px solid #e8f0e6;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #236010, #4a8a30);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header .icon-wrap {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(35, 96, 16, 0.1), rgba(35, 96, 16, 0.04));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-header .icon-wrap i {
            font-size: 26px;
            color: #236010;
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0b1a0f;
            letter-spacing: -0.3px;
        }
        .login-header p {
            color: #4a5a4e;
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2d3b32;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            border: 1.5px solid #e4ede2;
            border-radius: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcfa;
        }
        .form-group .input-wrap:focus-within {
            border-color: #236010;
            box-shadow: 0 0 0 3px rgba(35, 96, 16, 0.08);
            background: #fff;
        }
        .form-group .input-wrap i {
            color: #8aaa7e;
            font-size: 16px;
            padding: 0 0 0 16px;
            flex-shrink: 0;
        }
        .form-group .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: none;
            font-size: 15px;
            font-family: inherit;
            color: #0b1a0f;
            outline: none;
        }
        .form-group .input-wrap input:-webkit-autofill,
        .form-group .input-wrap input:-webkit-autofill:hover,
        .form-group .input-wrap input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #fafcfa inset;
            -webkit-text-fill-color: #0b1a0f;
            caret-color: #0b1a0f;
            border-radius: 14px;
        }
        .input-wrap:focus-within input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #fff inset;
        }
        .form-group .input-wrap input::placeholder {
            color: #b0c4a8;
        }
        .toggle-pass {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 16px 0 0;
            color: #8aaa7e;
            font-size: 16px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-pass:hover {
            color: #236010;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .check-round {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #4a5a4e;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }
        .check-round input {
            display: none;
        }
        .check-round .circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #c8dac0;
            background: #fafcfa;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.25s, border-color 0.25s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .check-round .circle i {
            font-size: 11px;
            color: #fff;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .check-round input:checked + .circle {
            background: #236010;
            border-color: #236010;
            transform: scale(1.05);
        }
        .check-round input:checked + .circle i {
            opacity: 1;
            transform: scale(1);
        }
        .check-round:active .circle {
            transform: scale(0.92);
        }
        .form-options a {
            font-size: 14px;
            color: #236010;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .form-options a:hover {
            color: #1a4a0d;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #236010, #1a4a0d);
            color: #fff;
            padding: 16px 34px;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(35, 96, 16, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(35, 96, 16, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login i {
            font-size: 16px;
        }

        .login-error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            align-items: center;
            gap: 10px;
        }
        .login-error i {
            color: #dc2626;
            flex-shrink: 0;
        }
        .login-error.show {
            display: flex;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #4a5a4e;
        }
        .register-link a {
            color: #236010;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .register-link a:hover {
            color: #1a4a0d;
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 18px;
            }
            .header-inner img {
                height: 38px;
            }
            .main {
                padding: 20px 18px 40px;
            }
            .login-card {
                padding: 36px 24px;
                border-radius: 24px;
            }
            .login-header h1 {
                font-size: 22px;
            }
            .form-group .input-wrap input {
                padding: 12px 14px;
                font-size: 16px;
            }
            .btn-login {
                padding: 14px 28px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 14px;
            }
            .header-inner img {
                height: 32px;
            }
            .main {
                padding: 12px 14px 32px;
            }
            .login-card {
                padding: 28px 18px;
                border-radius: 20px;
            }
            .login-header .icon-wrap {
                width: 48px;
                height: 48px;
            }
            .login-header .icon-wrap i {
                font-size: 22px;
            }
            .login-header h1 {
                font-size: 20px;
            }
            .form-group .input-wrap input {
                padding: 11px 12px;
                font-size: 16px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <img src="logo.png" alt="ЯВЬ мониторинг">
        <a href="index.html" class="header-back"><i class="fas fa-arrow-left"></i> на сайт</a>
    </div>
</header>

<main class="main">
    <div class="login-card">
        <div class="login-header">
            <div class="icon-wrap">
                <i class="fas fa-lock"></i>
            </div>
            <h1>Вход в систему</h1>
            <p>Войдите в личный кабинет мониторинга</p>
        </div>

        <div class="login-error" id="loginError">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Неверный email или пароль</span>
        </div>

        <form id="loginForm" novalidate autocomplete="off">
            <div class="form-group">
                <label for="email">Электронная почта</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="your@email.ru" required autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')">
                    <button type="button" class="toggle-pass" id="togglePass" aria-label="Показать пароль">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="check-round">
                    <input type="checkbox" checked>
                    <span class="circle"><i class="fas fa-check"></i></span>
                    Запомнить меня
                </label>
                <a href="#">Забыли пароль?</a>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Войти
            </button>
        </form>

        <div class="register-link">
            Нет аккаунта? <a href="#">Связаться с нами</a>
        </div>
    </div>
</main>

<script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const errorBox = document.getElementById('loginError');
    const errorText = document.getElementById('errorText');
    const togglePass = document.getElementById('togglePass');
    const passIcon = togglePass.querySelector('i');

    setTimeout(() => {
        email.value = '';
        password.value = '';
    }, 100);

    togglePass.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        passIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });

    form.addEventListener('submit', function (e) {
        e.preventDefault();

        errorBox.classList.remove('show');

        const emailVal = email.value.trim();
        const passVal = password.value.trim();

        if (!emailVal) {
            showError('Введите email');
            email.focus();
            return;
        }
        if (!/\S+@\S+\.\S+/.test(emailVal)) {
            showError('Введите корректный email');
            email.focus();
            return;
        }
        if (!passVal) {
            showError('Введите пароль');
            password.focus();
            return;
        }
        if (passVal.length < 6) {
            showError('Пароль должен быть не менее 6 символов');
            password.focus();
            return;
        }

        window.location.href = 'index.html';
    });

    function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.add('show');
    }

    email.addEventListener('input', function () {
        errorBox.classList.remove('show');
    });
    password.addEventListener('input', function () {
        errorBox.classList.remove('show');
    });
</script>

</body>
</html>
